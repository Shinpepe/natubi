name: 데이터 자동 갱신

on:
  schedule:
    # 평일 17:10 KST (= 08:10 UTC) — 장 마감 후 데이터 확정 시점
    # KST는 서머타임이 없어 UTC 환산이 연중 고정
    - cron: '10 8 * * 1-5'
  workflow_dispatch:      # Actions 탭에서 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 폭주 방지 상한 — 정상 실행이 최대 ~30분까지 관측된 바 있어 2배 여유
    steps:
      - name: 체크아웃
        uses: actions/checkout@v5

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 및 분석
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TOP_N: '300'
        run: python build_data.py

      - name: 변경사항 커밋
        run: |
          git config user.name "natubi-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "변경 없음 — 커밋 생략" && exit 0
          git commit -m "📊 데이터 갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          # 잡 실행 중 다른 커밋이 푸시됐을 때 non-fast-forward로 실패하는 것 방지
          git pull --rebase origin main
          git push
