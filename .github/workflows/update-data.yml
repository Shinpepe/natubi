name: 데이터 자동 갱신

on:
  schedule:
    # 평일 17:10 KST (= 08:10 UTC) — 장 마감 후 데이터 확정 시점
    - cron: '10 8 * * 1-5'
  workflow_dispatch:      # Actions 탭에서 수동 실행 버튼 활성화

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v5

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 데이터 수집 및 분석
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TOP_N: '100'
        run: python build_data.py

      - name: 변경사항 커밋
        run: |
          git config user.name "natubi-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "📊 데이터 갱신 $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')"
          git push
